services:
  # MongoDB Service
  mongodb:
    image: mongo:latest
    container_name: mongodb_container
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: supersecretpassword
    volumes:
      - mongo_data:/data/db
    networks:
      - mongo_network

  # Mongo Express Web GUI Service
  mongo-express:
    image: mongo-express:latest
    container_name: express_container
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb_container
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: supersecretpassword
      ME_CONFIG_BASICAUTH_USERNAME: webadmin
      ME_CONFIG_BASICAUTH_PASSWORD: webpassword
    depends_on:
      - mongodb
    networks:
      - mongo_network

volumes:
  mongo_data:

networks:
  mongo_network:
